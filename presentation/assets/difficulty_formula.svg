<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260"><rect width="860" height="260" fill="#ffffff"/><text x="30" y="42" font-family="Arial" font-size="20" font-weight="700" fill="#172033">Формула сложности и запрет утечки</text><rect x="30" y="68" width="520" height="150" rx="8" fill="#f8fafc" stroke="#d7dde6"/><text x="52" y="100" font-family="Menlo, Consolas, monospace" font-size="15" fill="#172033">if started == 0: сложность = 0</text><text x="52" y="124" font-family="Menlo, Consolas, monospace" font-size="15" fill="#172033">else:</text><text x="52" y="148" font-family="Menlo, Consolas, monospace" font-size="15" fill="#172033">сложность = 0.6 × (1 - solved / started)</text><text x="52" y="172" font-family="Menlo, Consolas, monospace" font-size="15" fill="#172033">           + 0.25 × (users_with_hints / started)</text><text x="52" y="196" font-family="Menlo, Consolas, monospace" font-size="15" fill="#172033">           + 0.15 × (total_hints / started)</text><rect x="590" y="82" width="230" height="118" rx="8" fill="#fff5eb" stroke="#df7b32" stroke-width="2"/><text x="705" y="118" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#172033">Не использовать в X</text><text x="705" y="148" text-anchor="middle" font-family="Arial" font-size="14" fill="#627084">started, solved</text><text x="705" y="168" text-anchor="middle" font-family="Arial" font-size="14" fill="#627084">users_with_hints</text><text x="705" y="188" text-anchor="middle" font-family="Arial" font-size="14" fill="#627084">total_hints, rates</text></svg>